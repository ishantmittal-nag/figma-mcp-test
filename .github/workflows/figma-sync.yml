name: Sync Figma Icons

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Fetch and Download Icons
        env:
          FIGMA_TOKEN: ${{ secrets.FIGMA_TOKEN }}
          FIGMA_FILE_ID: "MmTgevi8mvxSknkG4PneZ3"
        run: |
          mkdir -p ./assets/icons
          node -e "
          const fs = require('fs');
          const https = require('https');

          const fetchUrl = (url, headers = {}) => new Promise((resolve, reject) => {
            https.get(url, { headers }, (res) => {
              let data = '';
              res.on('data', chunk => data += chunk);
              res.on('end', () => {
                try { resolve(JSON.parse(data)); } catch(e) { reject(e); }
              });
            }).on('error', reject);
          });

          const downloadFile = (url, dest) => new Promise((resolve, reject) => {
            const file = fs.createWriteStream(dest);
            https.get(url, (res) => {
              res.pipe(file);
              file.on('finish', () => file.close(resolve));
            }).on('error', reject);
          });

          async function main() {
            const token = process.env.FIGMA_TOKEN;
            const fileId = process.env.FIGMA_FILE_ID;
            const headers = { 'X-Figma-Token': token };

            console.log('Fetching file data from Figma...');
            const fileData = await fetchUrl(\`https://api.figma.com/v1/files/\${fileId}\`, headers);
            
            const componentMap = fileData.components || {};
            const componentIds = Object.keys(componentMap);

            if (componentIds.length === 0) {
              console.log('No registered components found in the file metadata.');
              return;
            }

            console.log(\`Found \${componentIds.length} total component references. Requesting encoded image URLs...\`);
            
            const chunkSize = 50; // Smaller chunk size for safer processing
            let downloadedCount = 0;

            for (let i = 0; i < componentIds.length; i += chunkSize) {
              const chunk = componentIds.slice(i, i + chunkSize);
              
              // Use URLSearchParams to safely encode colons (e.g., 9762:187 -> 9762%3A187)
              const params = new URLSearchParams({
                ids: chunk.join(','),
                format: 'svg'
              });

              const apiUrl = \`https://api.figma.com/v1/images/\${fileId}?\${params.toString()}\`;
              const imgData = await fetchUrl(apiUrl, headers);
              
              if (imgData.err) {
                console.error(\`API Error in batch: \${imgData.err}\`);
                continue;
              }

              if (imgData.images) {
                for (const [id, url] of Object.entries(imgData.images)) {
                  if (!url) continue;
                  
                  // Extract a clean name
                  let rawName = componentMap[id]?.name || id;
                  let cleanName = rawName.replace(/[\/\\?%*:|'\"<> ]/g, '_');
                  
                  const filename = \`./assets/icons/\${cleanName}.svg\`;
                  await downloadFile(url, filename);
                  downloadedCount++;
                }
              }
            }
            console.log(\`Successfully downloaded \${downloadedCount} physical SVG files!\`);
          }

          main().catch(err => { console.error(err); process.exit(1); });
          "

      - name: Commit and Push Changes
        run: |
          git config --global user.name "Figma Bot"
          git config --global user.email "figmabot@github.com"
          
          git add assets/icons/
          
          if ! git diff --cached --quiet; then
            git commit -m "chore: automated figma icon update"
            git push origin HEAD:${{ github.ref_name }}
          else
            echo "No changes detected. Git workspace is clean."
          fi
