name: Sync Figma Icons

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24 # Updated to prevent the deprecation warning

      - name: Fetch and Download Icons
        env:
          FIGMA_TOKEN: ${{ secrets.FIGMA_TOKEN }}
          FIGMA_FILE_ID: "MmTgevi8mvxSknkG4PneZ3"
        run: |
          mkdir -p ./assets/icons
          node -e "
          const fs = require('fs');
          const https = require('https');

          const fetchUrl = (url, headers = {}) => new Promise((resolve, reject) => {
            https.get(url, { headers }, (res) => {
              let data = '';
              res.on('data', chunk => data += chunk);
              res.on('end', () => {
                try {
                  resolve(JSON.parse(data));
                } catch(e) {
                  console.error('Failed to parse JSON. Raw response preview:', data.substring(0, 200));
                  reject(e);
                }
              });
            }).on('error', reject);
          });

          const downloadFile = (url, dest) => new Promise((resolve, reject) => {
            const file = fs.createWriteStream(dest);
            https.get(url, (res) => {
              res.pipe(file);
              file.on('finish', () => file.close(resolve));
            }).on('error', reject);
          });

          async function main() {
            const token = process.env.FIGMA_TOKEN;
            const fileId = process.env.FIGMA_FILE_ID;
            const headers = { 'X-Figma-Token': token };

            console.log('Fetching components from Figma file...');
            const fileData = await fetchUrl(\`https://api.figma.com/v1/files/\${fileId}\`, headers);
            
            const componentIds = [];
            function findComponents(node) {
              if (node.type === 'COMPONENT') componentIds.push(node.id);
              if (node.children) node.children.forEach(findComponents);
            }
            findComponents(fileData.document);

            if (componentIds.length === 0) {
              console.log('No components found.');
              return;
            }

            console.log(\`Found \${componentIds.length} components. Splitting requests into safe batches...\`);
            
            // Chunking into batches of 100 to avoid hitting Figma API URL limits
            const chunkSize = 100;
            for (let i = 0; i < componentIds.length; i += chunkSize) {
              const chunk = componentIds.slice(i, i + chunkSize);
              console.log(\`Processing batch \${Math.floor(i/chunkSize) + 1} of \${Math.ceil(componentIds.length/chunkSize)}...\`);
              
              const imgData = await fetchUrl(\`https://api.figma.com/v1/images/\${fileId}?ids=\${chunk.join(',')}&format=svg\`, headers);
              
              if (imgData.images) {
                for (const [id, url] of Object.entries(imgData.images)) {
                  if (!url) continue;
                  // Clean file names by eliminating illegal characters
                  const componentName = fileData.components[id].name.replace(/[\/\\?%*:|'\"<> ]/g, '_');
                  const filename = \`./assets/icons/\${componentName}.svg\`;
                  await downloadFile(url, filename);
                }
              }
            }
            console.log('All icons synced successfully!');
          }

          main().catch(err => { console.error(err); process.exit(1); });
          "

      - name: Commit and Push Changes
        run: |
          git config --global user.name "Figma Bot"
          git config --global user.email "figmabot@github.com"
          git add ./assets/icons/
          git diff-index --quiet HEAD || git commit -m "chore: automated figma icon update"
          git push
